<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0f172a', // slate-950
              surface: '#1e293b', // slate-800
              primary: '#6366f1', // indigo-500
              secondary: '#64748b', // slate-500
              accent: '#38bdf8', // sky-400
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        /* Default to light mode background in CSS, let Tailwind handle dark class */
        background-color: #f8fafc;
        color: #0f172a;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #0f172a;
        color: #f8fafc;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Custom CSS Tooltips */
      .tooltip-container {
        position: relative;
      }
      .tooltip-content {
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%) translateY(-8px);
        background-color: #1e293b;
        color: #f8fafc;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 9999;
        pointer-events: none;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      /* Tooltip para baixo (usado em headers) */
      .tooltip-bottom .tooltip-content {
        bottom: auto;
        top: 100%;
        transform: translateX(-50%) translateY(8px);
      }

      .tooltip-container:hover .tooltip-content {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(-12px);
      }
      
      .tooltip-bottom:hover .tooltip-content {
        transform: translateX(-50%) translateY(12px);
      }

      /* Triângulos dos tooltips */
      .tooltip-content::after {
        content: '';
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border-width: 5px;
        border-style: solid;
        pointer-events: none;
      }
      
      /* Triângulo para cima (tooltip padrão) */
      .tooltip-container:not(.tooltip-bottom) .tooltip-content::after {
        top: 100%;
        border-color: #1e293b transparent transparent transparent;
      }
      
      /* Triângulo para baixo (tooltip-bottom) */
      .tooltip-bottom .tooltip-content::after {
        bottom: 100%;
        border-color: transparent transparent #1e293b transparent;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
